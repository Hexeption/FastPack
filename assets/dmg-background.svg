<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" width="540" height="380">
  <!-- Background -->
  <rect width="1080" height="760" fill="#1e1e2e"/>

  <!-- Decorative faint sprite blocks top-left -->
  <rect x="44"  y="44"  width="130" height="158" rx="12" fill="#f38ba8" opacity="0.055"/>
  <rect x="188" y="44"  width="204" height="72"  rx="12" fill="#89b4fa" opacity="0.055"/>
  <rect x="188" y="130" width="204" height="72"  rx="12" fill="#a6e3a1" opacity="0.055"/>
  <rect x="44"  y="218" width="96"  height="96"  rx="12" fill="#fab387" opacity="0.055"/>
  <rect x="154" y="218" width="238" height="96"  rx="12" fill="#cba6f7" opacity="0.055"/>
  <rect x="44"  y="330" width="162" height="60"  rx="12" fill="#94e2d5" opacity="0.055"/>
  <rect x="220" y="330" width="172" height="60"  rx="12" fill="#f9e2af" opacity="0.055"/>

  <!-- Decorative faint sprite blocks top-right (mirrored) -->
  <rect x="906" y="44"  width="130" height="158" rx="12" fill="#cba6f7" opacity="0.055"/>
  <rect x="688" y="44"  width="204" height="72"  rx="12" fill="#94e2d5" opacity="0.055"/>
  <rect x="688" y="130" width="204" height="72"  rx="12" fill="#f9e2af" opacity="0.055"/>
  <rect x="940" y="218" width="96"  height="96"  rx="12" fill="#89b4fa" opacity="0.055"/>
  <rect x="688" y="218" width="238" height="96"  rx="12" fill="#f38ba8" opacity="0.055"/>
  <rect x="874" y="330" width="162" height="60"  rx="12" fill="#fab387" opacity="0.055"/>
  <rect x="688" y="330" width="172" height="60"  rx="12" fill="#a6e3a1" opacity="0.055"/>

  <!-- Title -->
  <text
    x="540" y="112"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="#cdd6f4" text-anchor="middle">FastPack</text>
  <text
    x="540" y="156"
    font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif"
    font-size="24" font-weight="400"
    fill="#6c7086" text-anchor="middle">Sprite Atlas Packer</text>

  <!-- Drop zone — app (icon center at display 160,185 → SVG 320,370) -->
  <circle cx="320" cy="390" r="118" fill="#181825" opacity="0.45"/>
  <circle cx="320" cy="390" r="118" fill="none" stroke="#313244" stroke-width="1.5"/>

  <!-- Drop zone — Applications (icon center at display 380,185 → SVG 760,370) -->
  <circle cx="760" cy="390" r="118" fill="#181825" opacity="0.45"/>
  <circle cx="760" cy="390" r="118" fill="none" stroke="#313244" stroke-width="1.5"/>

  <!-- Arrow: from right edge of left zone to left edge of right zone -->
  <!-- Body: x 455–600, shaft height 28, centered at y=390 -->
  <polygon
    points="455,376 580,376 580,354 650,390 580,426 580,404 455,404"
    fill="#45475a"/>

  <!-- Install hint -->
  <text
    x="540" y="578"
    font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif"
    font-size="22" font-weight="400"
    fill="#45475a" text-anchor="middle">Drag FastPack to Applications to install</text>
</svg>
