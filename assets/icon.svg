<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e1e2e"/>

  <!-- Packed sprite rectangles — a miniature texture atlas -->

  <!-- Row 1: tall block left, two stacked blocks right -->
  <rect x="52" y="60"  width="152" height="180" rx="14" fill="#f38ba8"/>
  <rect x="220" y="60"  width="240" height="82"  rx="14" fill="#89b4fa"/>
  <rect x="220" y="158" width="240" height="82"  rx="14" fill="#a6e3a1"/>

  <!-- Row 2: small left, wide right -->
  <rect x="52"  y="256" width="112" height="108" rx="14" fill="#fab387"/>
  <rect x="180" y="256" width="280" height="108" rx="14" fill="#cba6f7"/>

  <!-- Row 3: two equal blocks -->
  <rect x="52"  y="380" width="190" height="72"  rx="14" fill="#94e2d5"/>
  <rect x="258" y="380" width="202" height="72"  rx="14" fill="#f9e2af"/>
</svg>
