name: release

on:
  push:
    branches: [master]
    tags: ["v*"]
  schedule:
    - cron: "0 0 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fastpack-linux-x86_64.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: fastpack-macos-x86_64.dmg
            arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fastpack-macos-aarch64.dmg
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fastpack-windows-x86_64.msi

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"
          cache-on-failure: "true"

      - name: system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - run: cargo build --release --package fastpack --target ${{ matrix.target }}

      - name: package Linux
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/fastpack
          tar -czf ${{ matrix.artifact }} \
            -C target/${{ matrix.target }}/release fastpack

      - name: package macOS DMG
        if: runner.os == 'macOS'
        run: |
          bash .github/scripts/package-macos.sh \
            "target/${{ matrix.target }}/release/fastpack" \
            "${{ matrix.artifact }}"

      - name: install WiX v4
        if: runner.os == 'Windows'
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext/6.0.2

      - name: package Windows MSI
        if: runner.os == 'Windows'
        run: >-
          wix build crates/fastpack/wix/main.wxs
          -arch x64
          -bindpath target/${{ matrix.target }}/release
          -bindpath crates/fastpack/wix
          -ext WixToolset.UI.wixext/6.0.2
          -o ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: changelog (nightly)
        id: cliff-nightly
        if: github.ref == 'refs/heads/master'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: changelog (release)
        id: cliff-release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: nightly release
        if: github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "artifacts/*"
          body: ${{ steps.cliff-nightly.outputs.content }}

      - name: tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          allowUpdates: false
          artifacts: "artifacts/*"
          body: ${{ steps.cliff-release.outputs.content }}
